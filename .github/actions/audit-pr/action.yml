name: 'Illuminate Audit PR'
description: 'Audit a pull request against the illuminate decision graph and policies'
inputs:
  fail-on-warning:
    description: 'If true, fail the check on warnings as well as violations'
    required: false
    default: 'false'
  illuminate-version:
    description: 'illuminate CLI version to install (default: latest from cargo)'
    required: false
    default: 'latest'
runs:
  using: 'composite'
  steps:
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install illuminate
      shell: bash
      run: |
        if [ "${{ inputs.illuminate-version }}" = "latest" ]; then
          cargo install --git https://github.com/rohansx/illuminate illuminate-cli --locked
        else
          cargo install illuminate-cli --version "${{ inputs.illuminate-version }}" --locked
        fi

    - name: Rebuild wiki + graph
      shell: bash
      run: |
        if [ -f .illuminate/illuminate.toml ]; then
          illuminate wiki rebuild || true
        else
          echo "::warning::No .illuminate/illuminate.toml in this repo; audit will only enforce policies passed via flags."
        fi

    - name: Audit PR
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set +e
        illuminate audit-pr ${{ github.event.pull_request.number }} \
          --repo ${{ github.repository }} \
          --comment \
          --format markdown
        STATUS=$?
        if [ "$STATUS" -eq 2 ]; then
          exit 2
        fi
        if [ "$STATUS" -eq 3 ] && [ "${{ inputs.fail-on-warning }}" = "true" ]; then
          exit 3
        fi
        exit 0
